<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>soundhuman</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;background:#f5f5f7;color:#1d1d1f;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
@media(prefers-color-scheme:dark){body{background:#1c1c1e;color:#f5f5f7}.card{background:#2c2c2e;border-color:#48484a}.sub{color:#98989d}.card p{color:#98989d}.tag{color:#6e6e73}.highlight{outline-color:#0a84ff}.btn-mac{background:#3a3a3c}}
.wrap{max-width:400px;width:100%;text-align:center}
.logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#0066cc,#409cff);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;margin:0 auto 16px}
h1{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.sub{font-size:13px;color:#86868b;margin-bottom:24px;line-height:1.5}
.card{background:#fff;border-radius:10px;padding:24px;text-align:left;border:1px solid #e0e0e2}
.card p{font-size:12px;color:#86868b;margin-bottom:12px;text-align:center}
.btn{display:flex;align-items:center;gap:10px;width:100%;padding:12px 16px;border-radius:8px;font-size:14px;font-weight:500;text-decoration:none;margin-bottom:8px;transition:opacity.15s}
.btn:hover{opacity:.85}
.btn-win{background:#0066cc;color:#fff}
.btn-mac{background:#1d1d1f;color:#fff}
.btn-linux{background:#e6a00e;color:#fff}
.btn span:first-child{width:24px;text-align:center}
.tag{font-size:11px;color:#aeaeb2;margin-top:20px;line-height:1.5;text-align:center}
.highlight{outline:2px solid #0066cc;outline-offset:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">sh</div>
  <h1>soundhuman</h1>
  <p class="sub">Text that sounds like you.<br>Install the app and capture to any chat.</p>
  <div class="card">
    <p>Choose your platform</p>
    <a class="btn btn-win" id="dl-win" href="/install/install.bat" download><span>🪟</span> Download for Windows</a>
    <a class="btn btn-mac" id="dl-mac" href="/install/install.sh" download><span>🍎</span> Download for macOS</a>
    <a class="btn btn-linux" id="dl-linux" href="/install/install.sh" download><span>🐧</span> Download for Linux</a>
  </div>
  <div class="tag">Compatible with Telegram, WhatsApp, Signal, and more.</div>
</div>
<script>
(function(){
var ua=navigator.userAgent,btns=['dl-win','dl-mac','dl-linux'],i=0;
if(ua.indexOf('Windows')>-1)i=0;else if(ua.indexOf('Mac')>-1)i=1;else if(ua.indexOf('Linux')>-1)i=2;
document.getElementById(btns[i]).className+=' highlight';
})();
</script>
</body>
</html>
