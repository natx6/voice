<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>soundhuman</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;background:#f5f5f7;color:#1d1d1f;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;transition:background .3s}
.wrap{max-width:400px;width:100%;text-align:center}
.logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#0066cc,#409cff);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;margin:0 auto 16px}
h1{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.sub{font-size:13px;color:#86868b;margin-bottom:24px;line-height:1.5;transition:color .3s}
.card{background:#fff;border-radius:10px;padding:24px;text-align:left;border:1px solid #e0e0e2;transition:background .3s,border-color .3s}
.card p{font-size:12px;color:#86868b;margin-bottom:12px;text-align:center;transition:color .3s}
.btn{display:flex;align-items:center;gap:10px;width:100%;padding:12px 16px;border-radius:8px;font-size:14px;font-weight:500;text-decoration:none;margin-bottom:8px;transition:opacity.15s}
.btn:hover{opacity:.85}
.btn-win{background:#0066cc;color:#fff}
.btn-mac{background:#1d1d1f;color:#fff}
.btn-linux{background:#e6a00e;color:#fff}
.btn span:first-child{width:24px;text-align:center}
.tag{font-size:11px;color:#aeaeb2;margin-top:20px;line-height:1.5;text-align:center;transition:color .3s}
.highlight{outline:2px solid #0066cc;outline-offset:2px}
</style>
</head>
<body id="bdy">
<div class="wrap">
  <div class="logo">sh</div>
  <h1>soundhuman</h1>
  <p class="sub" id="sub">Text that sounds like you.<br>Install the app and capture to any chat.</p>
  <div class="card" id="card">
    <p id="cardp">Choose your platform</p>
    <a class="btn btn-win" id="dl-win" href="/install/install.bat" download><span>🪟</span> Download for Windows</a>
    <a class="btn btn-mac" id="dl-mac" href="/install/install.sh" download><span>🍎</span> Download for macOS</a>
    <a class="btn btn-linux" id="dl-linux" href="/install/install.sh" download><span>🐧</span> Download for Linux</a>
  </div>
  <div class="tag" id="tag">Compatible with Telegram, WhatsApp, Signal, and more.</div>
</div>
<script>
(function(){
var t=localStorage.getItem('sh-theme'),m=window.matchMedia('(prefers-color-scheme:dark)');
if(t==='dark'||(t===null&&m.matches)){
  document.getElementById('bdy').style.background='#1c1c1e';
  document.getElementById('card').style.background='#2c2c2e';
  document.getElementById('card').style.borderColor='#48484a';
  document.getElementById('sub').style.color='#98989d';
  document.getElementById('cardp').style.color='#98989d';
  document.getElementById('tag').style.color='#6e6e73';
}
var u=navigator.userAgent,b=['dl-win','dl-mac','dl-linux'],i=0;
if(u.indexOf('Windows')>-1)i=0;else if(u.indexOf('Mac')>-1)i=1;else if(u.indexOf('Linux')>-1)i=2;
document.getElementById(b[i]).className+=' highlight';
})();
</script>
</body>
</html>
